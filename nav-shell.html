<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>REAM — App shell</title>
<link rel="stylesheet" href="ream.css" />
<link rel="stylesheet" href="dialog.css" />
<style>
  /* ============================================================
     nav-shell additions — extend (not replace) the reference
     prospects.html / prospect-detail.html visual vocabulary.
     - Sidebar uses .sidebar / .brand / .group-label / .nav-item / .user
       from ream.css. We add: org-pill brand row, collapsible groups,
       presence dot + role chip in the user pill, sidebar bottom-rail
       icon buttons, notifications panel, generic menu popover.
     ============================================================ */

  /* --- Org pill (replaces simple "Ream" wordmark in the brand slot) --- */
  .sidebar .brand.org-pill {
    padding: 8px 8px 12px;
    margin: 0;
    cursor: pointer;
    background: transparent;
    border: 0;
    width: 100%;
    text-align: left;
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 10px;
    font-family: var(--font-sans); /* override .brand display-font; we want SaaS-style row */
    font-weight: 600;
    font-size: 14px;
    color: var(--color-grey-800);
    letter-spacing: 0;
    border-radius: 8px;
    transition: background .12s;
  }
  .sidebar .brand.org-pill:hover { background: var(--color-grey-50); }
  .sidebar .brand.org-pill .org-logo {
    width: 28px; height: 28px; border-radius: 7px;
    display: inline-flex; align-items: center; justify-content: center;
    font: 700 13px var(--font-sans); color: white;
    background: var(--color-brand-600);
    letter-spacing: -0.02em;
  }
  .sidebar .brand.org-pill .org-meta { line-height: 1.2; min-width: 0; }
  .sidebar .brand.org-pill .org-name {
    font: 600 13px var(--font-sans);
    color: var(--color-grey-900);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sidebar .brand.org-pill .org-plan {
    font: 500 10.5px var(--font-sans);
    color: var(--fg3);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }
  .sidebar .brand.org-pill .org-caret { color: var(--fg3); font-size: 14px; }

  /* --- Collapsible group label (was a static .group-label in ream.css) --- */
  .sidebar button.group-label {
    background: transparent; border: 0;
    width: 100%;
    cursor: pointer;
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 6px;
    border-radius: 6px;
    padding: 6px 10px 4px;
    text-align: left;
    /* inherit existing .group-label typography */
  }
  .sidebar button.group-label:hover { background: var(--color-grey-50); color: var(--color-grey-700); }
  .sidebar button.group-label .chev {
    font-size: 14px; color: var(--fg4);
    transition: transform .15s ease;
  }
  .sidebar .nav-group[data-collapsed="true"] button.group-label .chev { transform: rotate(-90deg); }
  .sidebar .nav-group[data-collapsed="true"] .nav-group-items { display: none; }
  .sidebar .nav-group .nav-group-items { display: flex; flex-direction: column; gap: 0; }
  /* Urgent indicator on collapsed groups */
  .sidebar button.group-label .urg {
    font: 600 9.5px var(--font-sans);
    color: var(--color-error-700, #b91c1c);
    background: var(--color-error-100, #fee2e2);
    padding: 1px 6px;
    border-radius: 999px;
    visibility: hidden;
  }
  .sidebar .nav-group[data-collapsed="true"][data-has-urgent="true"] button.group-label .urg { visibility: visible; }

  /* --- nav-item badges (override the inline style used on prospects.html) --- */
  .sidebar .nav-item .nav-badge {
    margin-left: auto;
    font: 600 10.5px var(--font-sans);
    background: var(--color-grey-100);
    color: var(--color-grey-700);
    padding: 1px 7px;
    border-radius: 999px;
    min-width: 18px; text-align: center;
  }
  .sidebar .nav-item.active .nav-badge { background: var(--color-brand-100); color: var(--color-brand-700); }
  .sidebar .nav-item .nav-badge.urgent { background: var(--color-error-100, #fee2e2); color: var(--color-error-700, #b91c1c); }
  .sidebar .nav-item .nav-dot {
    margin-left: auto;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--color-warning-500, #f59e0b);
  }

  /* --- Bottom rail: notifications + settings + help, sitting right above the .user pill --- */
  .sidebar .sb-rail {
    display: flex; gap: 4px;
    padding: 0 4px 6px;
  }
  .sidebar .sb-rail-btn {
    flex: 1;
    display: inline-flex; align-items: center; justify-content: center;
    height: 32px;
    border-radius: 6px;
    background: transparent; border: 0;
    color: var(--fg3); cursor: pointer;
    position: relative;
    transition: background .12s, color .12s;
  }
  .sidebar .sb-rail-btn:hover { background: var(--color-grey-50); color: var(--color-grey-800); }
  .sidebar .sb-rail-btn i { font-size: 16px; }
  .sidebar .sb-rail-btn .nb {
    position: absolute; top: 2px; right: 8px;
    background: var(--color-error-600, #dc2626);
    color: white;
    font: 700 9.5px var(--font-sans);
    padding: 1px 5px; border-radius: 999px;
    min-width: 16px; text-align: center; line-height: 1.4;
    box-shadow: 0 0 0 2px var(--color-base-white);
  }

  /* --- Augment .user pill with role chip + presence dot on avatar --- */
  .sidebar .user.with-menu {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    gap: 10px;
    background: transparent;
    border: 0;
    width: 100%;
    text-align: left;
  }
  .sidebar .user.with-menu .avatar { position: relative; }
  .sidebar .user.with-menu .avatar .presence {
    position: absolute; bottom: -1px; right: -1px;
    width: 11px; height: 11px;
    border-radius: 50%;
    border: 2px solid var(--color-base-white);
  }
  .presence[data-status="online"]   { background: #10b981; }
  .presence[data-status="away"]     { background: #f59e0b; }
  .presence[data-status="busy"]     { background: #ef4444; }
  .presence[data-status="invisible"]{ background: #94a3b8; }
  .presence[data-status="offline"]  { background: #cbd5e1; }
  .sidebar .user.with-menu .meta { min-width: 0; line-height: 1.2; }
  .sidebar .user.with-menu .role-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; min-width: 0; }
  .sidebar .user.with-menu .role-chip {
    font: 600 10px var(--font-sans);
    background: var(--color-grey-100);
    color: var(--color-grey-700);
    padding: 1px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px;
  }
  /* Override default .user .status (green text) — we now show role chip instead */
  .sidebar .user.with-menu .status { display: none; }
  .sidebar .user.with-menu .more { color: var(--fg3); font-size: 14px; align-self: center; }

  /* --- Generic popover (used for org / settings / quickadd / user menus) --- */
  .menu-pop {
    position: fixed; z-index: 6000;
    background: white;
    border: 1px solid var(--border-default);
    border-radius: 10px;
    box-shadow: 0 16px 40px rgba(15, 23, 42, 0.16), 0 2px 6px rgba(15,23,42,.06);
    padding: 6px;
    min-width: 240px;
    display: flex; flex-direction: column;
    font: 13px var(--font-sans);
  }
  .menu-pop .mp-section {
    padding: 8px 10px 4px;
    font: 600 10.5px var(--font-sans);
    color: var(--fg3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .menu-pop .mp-item {
    display: grid;
    grid-template-columns: 22px 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 7px 10px;
    border: 0; background: transparent;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    color: var(--color-grey-800);
    font: 500 13px var(--font-sans);
  }
  .menu-pop .mp-item:hover { background: var(--color-grey-50); }
  .menu-pop .mp-item i.lead { font-size: 15px; color: var(--fg3); width: 22px; text-align: center; }
  .menu-pop .mp-item .check { color: var(--color-brand-600); font-size: 14px; visibility: hidden; }
  .menu-pop .mp-item[aria-current="true"] .check { visibility: visible; }
  .menu-pop .mp-item[aria-current="true"] { color: var(--color-grey-900); font-weight: 600; }
  .menu-pop .mp-item .pres-dot { width: 9px; height: 9px; border-radius: 50%; }
  .menu-pop .sep { height: 1px; background: var(--border-subtle); margin: 6px 4px; }

  /* Org switcher rows (richer than mp-item) */
  .menu-pop .mp-org {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 10px; align-items: center;
    padding: 8px 10px;
    border: 0; background: transparent; border-radius: 7px;
    cursor: pointer; text-align: left; width: 100%;
    color: var(--color-grey-800);
  }
  .menu-pop .mp-org:hover { background: var(--color-grey-50); }
  .menu-pop .mp-org .lg { width: 28px; height: 28px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; font: 700 12px var(--font-sans); color: white; }
  .menu-pop .mp-org .nm { font: 600 13px var(--font-sans); color: var(--color-grey-900); line-height: 1.25; }
  .menu-pop .mp-org .pl { font: 500 11px var(--font-sans); color: var(--fg3); margin-top: 1px; }
  .menu-pop .mp-org .check { color: var(--color-brand-600); font-size: 14px; visibility: hidden; }
  .menu-pop .mp-org[aria-current="true"] .check { visibility: visible; }

  /* Role rows: a sub-line for description */
  .menu-pop .mp-role {
    display: grid; grid-template-columns: 22px 1fr auto;
    gap: 10px; align-items: center;
    padding: 7px 10px;
    border: 0; background: transparent; border-radius: 6px;
    cursor: pointer; text-align: left; width: 100%;
  }
  .menu-pop .mp-role:hover { background: var(--color-grey-50); }
  .menu-pop .mp-role i.lead { font-size: 15px; color: var(--fg3); }
  .menu-pop .mp-role .nm { font: 500 13px var(--font-sans); color: var(--color-grey-800); line-height: 1.2; }
  .menu-pop .mp-role[aria-current="true"] .nm { color: var(--color-grey-900); font-weight: 600; }
  .menu-pop .mp-role .desc { font: 11px var(--font-sans); color: var(--fg3); margin-top: 2px; line-height: 1.3; }
  .menu-pop .mp-role .check { color: var(--color-brand-600); font-size: 14px; visibility: hidden; align-self: center; }
  .menu-pop .mp-role[aria-current="true"] .check { visibility: visible; }

  .menu-pop .mp-head {
    padding: 10px 10px 6px;
  }
  .menu-pop .mp-head .nm  { font: 600 13px var(--font-sans); color: var(--color-grey-900); }
  .menu-pop .mp-head .em  { font: 12px var(--font-sans); color: var(--fg3); margin-top: 2px; }
  .menu-pop .mp-head .tag { display: inline-block; margin-top: 6px;
                            font: 600 9.5px var(--font-sans);
                            padding: 1px 6px; border-radius: 4px;
                            text-transform: uppercase; letter-spacing: 0.04em; }
  .menu-pop .mp-head .tag[data-dept="follow_up"] { background: var(--color-blue-50, #ecfeff);  color: var(--color-blue-700, #0e7490); }
  .menu-pop .mp-head .tag[data-dept="sales"]     { background: var(--color-warning-50);        color: var(--color-warning-700); }
  .menu-pop .mp-head .tag[data-dept="finance"]   { background: var(--color-success-50);        color: var(--color-success-700); }
  .menu-pop .mp-head .tag[data-dept="admin"]     { background: var(--color-brand-50);          color: var(--color-brand-700); }

  /* --- Notifications panel --- */
  .nt-panel {
    position: fixed; z-index: 6000;
    width: 380px; max-height: 540px;
    background: white;
    border: 1px solid var(--border-default);
    border-radius: 10px;
    box-shadow: 0 16px 40px rgba(15, 23, 42, 0.16), 0 2px 6px rgba(15,23,42,.06);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .nt-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border-subtle); }
  .nt-head .ti { font: 600 14px var(--font-sans); color: var(--color-grey-900); }
  .nt-head .clear { font: 500 12px var(--font-sans); color: var(--color-brand-600); background: transparent; border: 0; cursor: pointer; padding: 4px 6px; border-radius: 4px; }
  .nt-head .clear:hover { background: var(--color-brand-50); }
  .nt-tabs { display: flex; gap: 2px; padding: 6px 8px; border-bottom: 1px solid var(--border-subtle); }
  .nt-tab { flex: 1; padding: 6px 8px; font: 500 12px var(--font-sans); color: var(--fg3); background: transparent; border: 0; border-radius: 6px; cursor: pointer; }
  .nt-tab:hover { background: var(--color-grey-50); }
  .nt-tab.on { color: var(--color-grey-900); background: var(--color-grey-100); font-weight: 600; }
  .nt-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .nt-item {
    display: grid; grid-template-columns: 32px 1fr auto;
    gap: 10px; padding: 10px 14px; cursor: pointer;
    border-bottom: 1px solid var(--border-subtle);
  }
  .nt-item:last-child { border-bottom: 0; }
  .nt-item:hover { background: var(--color-grey-50); }
  .nt-item .ic { width: 32px; height: 32px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; }
  .nt-item .ic[data-tone="brand"]   { background: var(--color-brand-50);   color: var(--color-brand-700); }
  .nt-item .ic[data-tone="success"] { background: var(--color-success-50); color: var(--color-success-700); }
  .nt-item .ic[data-tone="warn"]    { background: var(--color-warning-50); color: var(--color-warning-700); }
  .nt-item .ic[data-tone="error"]   { background: var(--color-error-50, #fee2e2); color: var(--color-error-700, #b91c1c); }
  .nt-item .body { line-height: 1.35; min-width: 0; }
  .nt-item .ti { font: 600 12.5px var(--font-sans); color: var(--color-grey-900); }
  .nt-item .sb { font: 12px var(--font-sans); color: var(--fg3); margin-top: 1px; }
  .nt-item .ts { font: 500 10.5px var(--font-sans); color: var(--fg4); white-space: nowrap; margin-top: 2px; }
  .nt-item.unread .ti::after {
    content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--color-brand-600); margin-left: 6px; vertical-align: middle;
  }
  .nt-empty { padding: 32px 18px; text-align: center; color: var(--fg3); font: 13px var(--font-sans); }
  .nt-empty i { font-size: 26px; color: var(--color-grey-300); display: block; margin-bottom: 6px; }

  /* --- Page content overrides --- */
  /* Match prospects.html .insight-strip (5-col responsive grid of cards) */
  .insight-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .insight-strip .card { padding: 14px 16px; }
  .insight-strip .card-title { font-size: 12px; margin-bottom: 4px; color: var(--fg3); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; }
  .insight-strip .card-value { font-size: 22px; font-weight: 700; color: var(--color-grey-900); letter-spacing: -0.01em; }
  .insight-strip .delta { font-size: 11px; margin-top: 4px; }
  .insight-strip .delta.up { color: var(--color-success-600); }
  .insight-strip .delta.muted { color: var(--fg3); }
  .insight-strip .delta.warn { color: var(--color-warning-700); }

  /* Today's focus list — matches prospect-detail's reminder rows */
  .focus-card { margin-top: 16px; }
  .focus-card h3 { margin: 0 0 10px; font: 600 14px var(--font-sans); color: var(--color-grey-900); display: flex; align-items: center; gap: 8px; }
  .focus-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  .focus-list li {
    display: grid; grid-template-columns: 28px 1fr auto;
    gap: 10px; align-items: center;
    padding: 10px 12px; border: 1px solid var(--border-default); border-radius: 8px; background: white;
  }
  .focus-list li .ic { width: 28px; height: 28px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; }
  .focus-list .ti { font: 500 13px var(--font-sans); color: var(--color-grey-900); }
  .focus-list .sb { font: 11.5px var(--font-sans); color: var(--fg3); margin-top: 1px; }
  .focus-list .when { font: 500 11.5px var(--font-sans); color: var(--fg3); }

  /* Demo role indicator — slim, uses badge primitive */
  .demo-line {
    display: inline-flex; align-items: center; gap: 8px;
    font: 12px var(--font-sans); color: var(--fg3);
    margin: -2px 0 14px;
  }
  .demo-line code { font: 600 11.5px var(--font-mono, ui-monospace, Menlo, monospace); background: var(--color-grey-100); color: var(--color-grey-800); padding: 1px 6px; border-radius: 4px; }
</style>
</head>
<body>

<div class="browser">
  <div class="browser-bar">
    <div class="traffic"><span></span><span></span><span></span></div>
    <div class="nav-icons"><i class="ri-arrow-left-s-line"></i><i class="ri-arrow-right-s-line"></i></div>
    <div class="tab"><i class="ri-global-line"></i> REAM</div>
    <div class="url"><i class="ri-lock-line"></i> ream.app/home</div>
    <div class="nav-icons"><i class="ri-star-line"></i><i class="ri-more-2-fill"></i></div>
  </div>

  <div class="app">
    <!-- =========== SIDEBAR =========== -->
    <aside class="sidebar">

      <!-- Org switcher (replaces simple "Ream" wordmark in the brand slot) -->
      <button class="brand org-pill" type="button" id="orgSwitcher" aria-haspopup="menu" aria-expanded="false">
        <span class="org-logo" id="orgLogo">G</span>
        <span class="org-meta">
          <span class="org-name" id="orgName">Goldcrest Realty</span>
          <span class="org-plan" id="orgPlan">Growth · Accra</span>
        </span>
        <i class="ri-expand-up-down-line org-caret"></i>
      </button>

      <!-- Nav body (built by JS) -->
      <div id="sbNav"></div>

      <div class="spacer"></div>

      <!-- Bottom rail: notifications, settings, help -->
      <div class="sb-rail">
        <button class="sb-rail-btn" type="button" id="ntBtn" title="Notifications" aria-haspopup="menu">
          <i class="ri-notification-3-line"></i>
          <span class="nb" id="ntBadge">5</span>
        </button>
        <button class="sb-rail-btn" type="button" id="settingsBtn" title="Settings" aria-haspopup="menu">
          <i class="ri-settings-3-line"></i>
        </button>
        <button class="sb-rail-btn" type="button" id="helpBtn" title="Help & support">
          <i class="ri-question-line"></i>
        </button>
      </div>

      <!-- User pill -->
      <button class="user with-menu" type="button" id="userMenuBtn" aria-haspopup="menu">
        <div class="avatar" style="background: var(--color-brand-700);">
          <span id="userInitials">KM</span>
          <span class="presence" id="userPresence" data-status="online"></span>
        </div>
        <div class="meta">
          <div class="name" id="userName">Kevin Manga</div>
          <div class="role-row">
            <span class="role-chip" id="userRoleChip">Admin / Owner</span>
          </div>
        </div>
        <i class="ri-expand-up-down-line more"></i>
      </button>
    </aside>

    <!-- =========== MAIN =========== -->
    <section class="main">
      <div class="topbar">
        <div class="breadcrumb">
          <span class="current" id="pageTitle">Home</span>
        </div>
        <div class="actions">
          <div class="search">
            <i class="ri-search-line"></i>
            <input id="globalSearch" placeholder="Search prospects, listings, loans…" />
          </div>
        </div>
      </div>

      <div class="content">
        <div class="ph-head">
          <div class="ph-title">
            <h1 class="page-title" id="greetingLine">Good afternoon, Kevin</h1>
            <div style="font-size:13px; color: var(--fg3); margin-top:4px; max-width:560px;" id="greetingSub">
              Here's what's happening across Goldcrest Realty.
            </div>
            <div class="demo-line">
              <i class="ri-information-line"></i>
              <span>Demo · viewing as <code id="bannerRole">ADMIN / OWNER</code> at <code id="bannerOrg">Goldcrest Realty</code>. Switch via your avatar.</span>
            </div>
          </div>
          <div class="ph-actions">
            <button class="btn btn-secondary" type="button" id="quickAddBtn"><i class="ri-add-line"></i> New</button>
          </div>
        </div>

        <!-- Insight strip — same primitive as prospects.html -->
        <div class="insight-strip" id="homeGrid"></div>

        <!-- Today's focus — list pattern from prospect-detail -->
        <div class="card focus-card">
          <h3><i class="ri-focus-3-line"></i> Today's focus</h3>
          <ul class="focus-list" id="focusList"></ul>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
/* ============================================================
   DATA
   ============================================================ */
const ORGS = [
  { id: 'goldcrest', name: 'Goldcrest Realty',  short: 'G', plan: 'Growth · Accra',     color: 'var(--color-brand-600)',     listings: 124, prospects: 42,  customers: 186, loans: 89  },
  { id: 'palmview',  name: 'Palmview Estates',  short: 'P', plan: 'Starter · Tema',     color: 'var(--color-success-600)',   listings: 38,  prospects: 14,  customers: 61,  loans: 23  },
  { id: 'avenir',    name: 'Avenir Properties', short: 'A', plan: 'Enterprise · Lagos', color: 'var(--color-blue-600, #2563eb)', listings: 412, prospects: 156, customers: 894, loans: 327 }
];

const ROLES = [
  { id: 'follow_up_agent',   label: 'Follow-up agent',   dept: 'follow_up', desc: 'Manages reminders & document collection' },
  { id: 'sales_agent',       label: 'Sales agent',       dept: 'sales',     desc: 'Works prospects & shares listings' },
  { id: 'follow_up_manager', label: 'Follow-up manager', dept: 'follow_up', desc: 'Oversees follow-up team & docs queue' },
  { id: 'sales_manager',     label: 'Sales manager',     dept: 'sales',     desc: 'Oversees sales team & listings' },
  { id: 'finance_manager',   label: 'Finance manager',   dept: 'finance',   desc: 'Oversees loans, repayments & payments' },

function renderNav() {
  const root = $('#sbNav');
  root.innerHTML = '';
  const role = state.roleId;
  const defaults = DEFAULT_COLLAPSED[role] || {};

  NAV.forEach(section => {
    const items = section.items.filter(it => it.roles.includes(role));
    if (!items.length) return;

    const collapsedKey = role + ':' + section.id;
    const isCollapsed = state.collapsed[collapsedKey] != null
      ? state.collapsed[collapsedKey]
      : !!defaults[section.id];

    const urgentCount = items.filter(i => i.urgent).reduce((s,i) => s + (i.badge || 0), 0);

    const grp = el('div', 'nav-group');
    grp.dataset.collapsed = isCollapsed ? 'true' : 'false';
    if (urgentCount > 0) grp.dataset.hasUrgent = 'true';

    const lbl = document.createElement('button');
    lbl.type = 'button';
    lbl.className = 'group-label';
    lbl.innerHTML = `
      <span>${section.label}</span>
      <span class="urg">${urgentCount}</span>
      <i class="ri-arrow-down-s-line chev"></i>
    `;
    lbl.addEventListener('click', () => {
      state.collapsed[collapsedKey] = !isCollapsed;
      renderNav();
    });
    grp.appendChild(lbl);

    const itemsWrap = el('div', 'nav-group-items');
    items.forEach(it => {
      const a = el('button', 'nav-item' + (state.active === it.id ? ' active' : ''));
      a.type = 'button';
      a.style.cssText = 'background:transparent; border:0; width:100%; text-align:left; cursor:pointer; font: inherit;';
      a.innerHTML = `
        <i class="${it.icon}"></i>
        <span>${it.label}</span>
        ${it.badge != null ? `<span class="nav-badge ${it.urgent ? 'urgent' : ''}">${it.badge}</span>`
          : it.dot ? `<span class="nav-dot" title="Action needed"></span>` : ''}
      `;
      a.addEventListener('click', () => {
        state.active = it.id;
        renderNav();
        $('#pageTitle').textContent = it.label;
      });
      itemsWrap.appendChild(a);
    });
    grp.appendChild(itemsWrap);
    root.appendChild(grp);
  });
}

/* ============================================================
   POPOVER PLACEMENT + DISMISS
   ============================================================ */
function placeNear(pop, anchor, side='right') {
  const r = anchor.getBoundingClientRect();
  document.body.appendChild(pop);
  const pr = pop.getBoundingClientRect();
  const margin = 8;
  let top, left;
  if (side === 'right')         { top = r.top;                 left = r.right + margin; }
  else if (side === 'top-right'){ top = r.top - pr.height - margin; left = r.right + margin; }
  else if (side === 'above')    { top = r.top - pr.height - margin; left = r.left; }
  else if (side === 'above-right'){top = r.top - pr.height - margin; left = r.right - pr.width; }
  else                          { top = r.bottom + margin;     left = r.left; }
  top  = Math.max(8, Math.min(top,  window.innerHeight - pr.height - 8));
  left = Math.max(8, Math.min(left, window.innerWidth  - pr.width  - 8));
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
}

function withDismiss(pop, anchor) {
  setTimeout(() => {
    function onDoc(e) {
      if (!pop.contains(e.target) && !(anchor && anchor.contains(e.target))) {
        pop.remove();
        document.removeEventListener('mousedown', onDoc);
        document.removeEventListener('keydown', onKey);
        if (anchor) anchor.setAttribute('aria-expanded', 'false');
      }
    }
    function onKey(e) {
      if (e.key === 'Escape') {
        pop.remove();
        document.removeEventListener('mousedown', onDoc);
        document.removeEventListener('keydown', onKey);
        if (anchor) anchor.setAttribute('aria-expanded', 'false');
      }
    }
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onKey);
  }, 0);
}

    { id: 'busy',      label: 'Do not disturb', color: '#ef4444' },
    { id: 'invisible', label: 'Invisible',      color: '#94a3b8' },
    { id: 'offline',   label: 'Appear offline', color: '#cbd5e1' }
  ];
  presences.forEach(p => {
    const b = el('button', 'mp-item');
    b.type = 'button';
    if (state.presence === p.id) b.setAttribute('aria-current', 'true');
    b.innerHTML = `<span class="pres-dot" style="background:${p.color};"></span><span>${p.label}</span><i class="ri-check-line check"></i>`;
    b.addEventListener('click', () => { state.presence = p.id; renderUser(); pop.remove(); openUserMenu(); });
    pop.appendChild(b);
  });

  pop.appendChild(el('div', 'sep'));

  pop.appendChild(el('div', 'mp-section', 'Switch role · demo'));
  ROLES.forEach(role => {
    const b = el('button', 'mp-role');
    b.type = 'button';
    if (state.roleId === role.id) b.setAttribute('aria-current', 'true');
    b.innerHTML = `
      <i class="lead ${roleIcon(role)}"></i>
      <div>
        <div class="nm">${role.label}</div>
        <div class="desc">${role.desc}</div>
      </div>
      <i class="ri-check-line check"></i>
    `;
    b.addEventListener('click', () => { setRole(role.id); pop.remove(); });
    pop.appendChild(b);
  });

  pop.appendChild(el('div', 'sep'));

  [['Profile settings','ri-user-line'], ['Keyboard shortcuts','ri-keyboard-line'], ['Switch organization','ri-building-2-line']]
    .forEach(([label, ic]) => {
      const b = el('button', 'mp-item', `<i class="lead ${ic}"></i><span>${label}</span><i class="ri-check-line check"></i>`);
      b.type = 'button';
      b.addEventListener('click', () => {
        if (label === 'Switch organization') { pop.remove(); openOrgSwitcher(); return; }
        toast(label); pop.remove();
      });
      pop.appendChild(b);
    });

  pop.appendChild(el('div', 'sep'));

  const out = el('button', 'mp-item');
  out.type = 'button';
  out.innerHTML = `<i class="lead ri-logout-circle-r-line" style="color:var(--color-error-600, #dc2626);"></i><span style="color:var(--color-error-600, #dc2626);">Sign out</span><i class="ri-check-line check"></i>`;
  out.addEventListener('click', () => { toast('Signing out…'); pop.remove(); });
  pop.appendChild(out);

  placeNear(pop, anchor, 'above-right');
  withDismiss(pop, anchor);
}

function roleIcon(role) {
  switch (role.dept) {
    case 'follow_up': return 'ri-user-voice-line';
    case 'sales':     return 'ri-user-star-line';
    case 'finance':   return 'ri-bank-line';
    default:          return 'ri-vip-crown-line';
  }
}

/* ============================================================
   NOTIFICATIONS
   ============================================================ */
function openNotifications() {
  closeAllPops();
  const anchor = $('#ntBtn');
  const pop = el('div', 'nt-panel');
  pop.innerHTML = `
    <div class="nt-head">
      <span class="ti">Notifications</span>
      <button class="clear" type="button">Mark all as read</button>
    </div>
    <div class="nt-tabs">
      <button class="nt-tab ${state.ntFilter==='all'?'on':''}" data-f="all">All</button>
      <button class="nt-tab ${state.ntFilter==='unread'?'on':''}" data-f="unread">Unread</button>
    </div>
    <div class="nt-list" id="ntList"></div>
  `;
  document.body.appendChild(pop);
  const r = anchor.getBoundingClientRect();
  pop.style.left = (r.right + 8) + 'px';
  pop.style.top  = Math.max(8, r.bottom - 480) + 'px';

  const list = pop.querySelector('#ntList');
  const renderList = () => {
    list.innerHTML = '';
    const items = NOTIFICATIONS.filter(n => state.ntFilter === 'all' || n.unread);
    if (!items.length) {
      list.innerHTML = `<div class="nt-empty"><i class="ri-checkbox-circle-line"></i>You're all caught up.</div>`;
      return;
    }
    items.forEach(n => {
      const r = el('div', 'nt-item' + (n.unread ? ' unread' : ''));
      r.innerHTML = `
        <span class="ic" data-tone="${n.tone}"><i class="${n.icon}"></i></span>
        <div class="body">
          <div class="ti">${n.ti}</div>
          <div class="sb">${n.sb}</div>
        </div>
        <span class="ts">${n.ts}</span>
      `;
      r.addEventListener('click', () => { n.unread = false; updateNtBadge(); renderList(); });
      list.appendChild(r);
    });
  };
  renderList();
  pop.querySelectorAll('.nt-tab').forEach(t => t.addEventListener('click', () => {
    state.ntFilter = t.dataset.f;
    pop.querySelectorAll('.nt-tab').forEach(x => x.classList.toggle('on', x.dataset.f === state.ntFilter));
    renderList();
  }));
  pop.querySelector('.clear').addEventListener('click', () => {
    NOTIFICATIONS.forEach(n => n.unread = false);
    updateNtBadge(); renderList();
  });
  withDismiss(pop, anchor);
}

function updateNtBadge() {
  const n = NOTIFICATIONS.filter(x => x.unread).length;
  const b = $('#ntBadge');
  if (n === 0) { b.style.display = 'none'; }
  else { b.style.display = ''; b.textContent = String(n); }
}

/* ============================================================
   TOAST
   ============================================================ */
function toast(msg) {
  const t = el('div', '', msg);
  Object.assign(t.style, {
    position: 'fixed', left: '50%', bottom: '24px', transform: 'translateX(-50%) translateY(20px)',
    background: 'var(--color-grey-900, #0f172a)', color: 'white', padding: '8px 14px', borderRadius: '8px',
    font: '500 13px var(--font-sans)', zIndex: 9999, opacity: '0', transition: 'all .18s ease', boxShadow: '0 8px 24px rgba(0,0,0,.18)'
  });
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)'; });
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(20px)'; setTimeout(() => t.remove(), 200); }, 1800);
}

/* ============================================================
   WIRE
   ============================================================ */
$('#orgSwitcher').addEventListener('click', openOrgSwitcher);
$('#quickAddBtn').addEventListener('click', openQuickAdd);
$('#userMenuBtn').addEventListener('click', openUserMenu);
$('#ntBtn').addEventListener('click', openNotifications);
$('#settingsBtn').addEventListener('click', openSettingsMenu);
$('#helpBtn').addEventListener('click', () => toast('Help center'));

document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
    e.preventDefault();
    $('#globalSearch').focus();
  }
});

renderOrgPill();
renderUser();
renderNav();
renderHome();
updateNtBadge();
</script>

</body>
