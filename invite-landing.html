<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ream — Invite landing flow</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" />
<style>
  /* The design canvas owns the body background. We just style the
     pages that live inside each artboard. */
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-sans); color: var(--color-grey-800); }

  /* Local design tokens for the landing page (kept off the global :root
     so they don't leak into other pages that share colors_and_type.css). */
  .il-frame {
    --il-rail-w: 420px;
    --il-pad-x: 64px;
    --il-pad-y: 56px;
    width: 100%;
    height: 100%;
    background: var(--color-base-white);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-radius: 0; /* parent dc-card already rounds */
  }

  /* ---------- Browser chrome ---------- */
  .il-bar {
    flex: 0 0 auto;
    height: 40px;
    background: #f4f4f5;
    border-bottom: 1px solid var(--color-grey-200);
    display: flex; align-items: center; gap: 14px;
    padding: 0 14px;
  }
  .il-traffic { display:flex; gap:6px; }
  .il-traffic span { width: 11px; height: 11px; border-radius: 50%; background: var(--color-grey-300); }
  .il-traffic span:nth-child(1) { background:#ff5f57; }
  .il-traffic span:nth-child(2) { background:#febc2e; }
  .il-traffic span:nth-child(3) { background:#28c840; }
  .il-url {
    flex: 1; max-width: 640px; margin: 0 auto;
    background: #fff; border: 1px solid var(--color-grey-200);
    border-radius: 999px; padding: 4px 12px;
    font: 500 12px/1 var(--font-mono); color: var(--color-grey-600);
    display: flex; align-items: center; gap: 8px;
  }
  .il-url i { color: var(--color-grey-500); font-size: 13px; }
  .il-bar-icons { display:flex; gap: 10px; color: var(--color-grey-500); font-size: 14px; }

  /* ---------- Two-pane page ---------- */
  .il-page {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: 1fr var(--il-rail-w);
    min-height: 0;
  }
  .il-main {
    padding: var(--il-pad-y) var(--il-pad-x);
    display: flex; flex-direction: column; gap: 18px;
    overflow: hidden;
  }

  /* ---------- Logo ---------- */
  .il-logo { display:inline-flex; align-items:center; gap:10px; }
  .il-logo-mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--color-brand-600); color: #fff;
    display:inline-flex; align-items:center; justify-content:center;
    font: 700 15px/1 var(--font-display);
  }
  .il-logo-word {
    font: 700 18px/1 var(--font-display);
    letter-spacing: -0.01em; color: var(--color-grey-900);
  }

  /* ---------- Typography on the main pane ---------- */
  .il-step-tag {
    display:inline-flex; align-items:center; gap:6px;
    align-self: flex-start;
    background: var(--color-brand-50); color: var(--color-brand-700);
    border: 1px solid var(--color-brand-100);
    border-radius: 999px; padding: 4px 10px;
    font: 600 10.5px/1 var(--font-sans);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .il-h1 {
    font: 700 36px/1.1 var(--font-display);
    letter-spacing: -0.025em;
    color: var(--color-grey-900);
    margin: 0;
    text-wrap: pretty;
  }
  .il-lede {
    font: 400 16px/1.5 var(--font-sans);
    color: var(--color-grey-600);
    margin: 0;
    max-width: 52ch;
    text-wrap: pretty;
  }
  .il-lede strong { color: var(--color-grey-900); font-weight: 600; }

  /* ---------- Bullets ---------- */
  .il-bullets {
    list-style: none; padding: 0; margin: 4px 0 0;
    display: flex; flex-direction: column; gap: 10px;
  }
  .il-bullets li {
    display:flex; align-items: flex-start; gap: 12px;
    font: 500 14.5px/1.5 var(--font-sans);
    color: var(--color-grey-700);
  }
  .il-bullets li i {
    color: var(--color-brand-600);
    font-size: 18px;
    width: 22px; flex: 0 0 22px;
    background: var(--color-brand-50);
    border-radius: 6px;
    height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }

  /* ---------- Buttons ---------- */
  .il-cta-row { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
  .il-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 18px;
    border-radius: 8px;
    font: 600 14px/1 var(--font-sans);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .12s, transform .06s;
  }
  .il-btn i { font-size: 16px; }
  .il-btn-primary {
    background: var(--color-brand-600); color: #fff;
  }
  .il-btn-primary:hover { background: var(--color-brand-700); }
  .il-btn-primary.is-disabled {
    background: var(--color-grey-200);
    color: var(--color-grey-500);
    cursor: not-allowed;
  }
  .il-btn-ghost {
    background: transparent; color: var(--color-grey-700);
    border-color: var(--color-grey-200);
  }
  .il-btn-ghost:hover { background: var(--color-grey-50); }

  /* ---------- Fineprint ---------- */
  .il-fineprint {
    font: 400 12.5px/1.55 var(--font-sans);
    color: var(--color-grey-500);
    margin-top: auto;
    max-width: 56ch;
  }
  .il-fineprint a { color: var(--color-brand-700); font-weight: 500; }
  .il-fineprint code {
    background: var(--color-grey-100);
    color: var(--color-grey-800);
    border: 1px solid var(--color-grey-200);
    padding: 1px 6px; border-radius: 4px;
    font: 11px/1.4 var(--font-mono);
  }

  /* ---------- Form ---------- */
  .il-form { display: flex; flex-direction: column; gap: 14px; }
  .il-field { display: flex; flex-direction: column; gap: 6px; }
  .il-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .il-field label {
    font: 600 12px/1 var(--font-sans);
    color: var(--color-grey-700);
    display: flex; align-items: center; gap: 8px;
  }
  .il-field label .il-opt {
    font-weight: 400; color: var(--color-grey-500); text-transform: none; letter-spacing: 0;
  }
  .il-locked {
    display: inline-flex; align-items: center; gap: 4px;
    font-weight: 500; color: var(--color-grey-500);
    background: var(--color-grey-100);
    padding: 2px 7px; border-radius: 999px;
    font-size: 10.5px;
  }
  .il-locked i { font-size: 11px; }
  .il-input {
    background: #fff;
    border: 1px solid var(--color-grey-300);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    font: 500 14px/1.4 var(--font-sans);
    color: var(--color-grey-800);
    min-height: 44px;
  }
  .il-input.is-locked {
    background: var(--color-grey-50);
    color: var(--color-grey-700);
    border-color: var(--color-grey-200);
  }
  .il-input.is-locked i { color: var(--color-grey-500); }
  .il-input.is-error {
    border-color: var(--color-error-500);
    box-shadow: 0 0 0 3px rgba(240, 68, 56, 0.15);
  }
  .il-mute { color: var(--color-grey-500); letter-spacing: 0.05em; }

  /* Strength meter */
  .il-strength {
    display: flex; align-items: center; gap: 10px;
    margin-top: 2px;
    font: 500 11.5px/1 var(--font-sans);
  }
  .il-strength-bars { display: flex; gap: 3px; flex: 1; }
  .il-strength-bars span {
    height: 4px; flex: 1; background: var(--color-grey-200); border-radius: 2px;
  }
  .il-strength-weak .il-strength-bars span.on { background: var(--color-error-500); }
  .il-strength-weak .il-strength-label { color: var(--color-error-700); }
  .il-strength-strong .il-strength-bars span.on { background: var(--color-success-500); }
  .il-strength-strong .il-strength-label { color: var(--color-success-700); }

  .il-hint {
    list-style: none; padding: 0; margin: 4px 0 0;
    display: flex; flex-direction: column; gap: 4px;
    font: 500 11.5px/1.4 var(--font-sans);
    color: var(--color-grey-600);
  }
  .il-hint li { display: flex; align-items: center; gap: 6px; }
  .il-hint li i { font-size: 13px; color: var(--color-success-600); }
  .il-hint-error li:nth-child(odd) i { color: var(--color-error-500); }
  .il-hint-error { color: var(--color-grey-700); }

  .il-check {
    display: flex; align-items: center; gap: 10px;
    font: 400 13px/1.5 var(--font-sans);
    color: var(--color-grey-700);
    margin-top: 2px;
  }
  .il-check input { accent-color: var(--color-brand-600); width: 16px; height: 16px; }
  .il-check a { color: var(--color-brand-700); font-weight: 500; }

  /* ---------- Banner (top of form) ---------- */
  .il-banner {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 14px;
    border-radius: 8px;
    font: 500 13px/1.4 var(--font-sans);
  }
  .il-banner i { font-size: 18px; flex: 0 0 auto; margin-top: 1px; }
  .il-banner strong { display:block; font-weight: 600; margin-bottom: 2px; }
  .il-banner-error {
    background: var(--color-error-50);
    color: var(--color-error-800);
    border: 1px solid var(--color-error-200);
  }
  .il-banner-error i { color: var(--color-error-600); }

  /* ---------- Status (unhappy paths) ---------- */
  .il-status { display: flex; flex-direction: column; gap: 16px; }
  .il-status-icon {
    width: 56px; height: 56px; border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 26px;
    align-self: flex-start;
  }
  .il-status-icon-warn { background: var(--color-warning-50); color: var(--color-warning-700); border: 1px solid var(--color-warning-200); }
  .il-status-icon-danger { background: var(--color-error-50); color: var(--color-error-700); border: 1px solid var(--color-error-200); }
  .il-status-icon-ok { background: var(--color-success-50); color: var(--color-success-700); border: 1px solid var(--color-success-200); }
  .il-status-icon-info { background: var(--color-blue-50); color: var(--color-blue-700); border: 1px solid var(--color-blue-200); }

  .il-callout {
    display: flex; gap: 12px;
    padding: 14px 16px;
    background: var(--color-grey-50);
    border: 1px solid var(--color-grey-200);
    border-radius: 10px;
    font: 400 13.5px/1.55 var(--font-sans);
    color: var(--color-grey-700);
  }
  .il-callout strong { color: var(--color-grey-900); font-weight: 600; }
  .il-callout i { font-size: 18px; color: var(--color-grey-500); flex: 0 0 auto; margin-top: 1px; }
  .il-callout-info {
    background: var(--color-blue-50);
    border-color: var(--color-blue-100);
  }
  .il-callout-info i { color: var(--color-blue-600); }

  /* Mismatch table (state 8) */
  .il-mismatch-table {
    border: 1px solid var(--color-grey-200);
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
  }
  .il-mismatch-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--color-grey-100);
  }
  .il-mismatch-row:last-child { border-bottom: 0; }
  .il-mismatch-k { font: 500 12px/1 var(--font-sans); color: var(--color-grey-500); text-transform: uppercase; letter-spacing: 0.06em; }
  .il-mismatch-v { display: flex; align-items: center; gap: 10px; font: 500 14px/1.3 var(--font-sans); color: var(--color-grey-800); }
  .il-mismatch-row.is-target { background: var(--color-brand-50); }
  .il-mismatch-row.is-target .il-mismatch-k { color: var(--color-brand-700); }
  .il-mismatch-row.is-target .il-mismatch-v strong { color: var(--color-brand-800); font-weight: 600; }

  /* Success state */
  .il-success-wrap { display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }
  .il-success-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--color-success-500); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 0 8px rgba(23, 178, 106, 0.12);
  }
  .il-progress {
    list-style: none; padding: 0; margin: 0;
    display: flex; flex-direction: column; gap: 10px;
    font: 500 14px/1.3 var(--font-sans);
    color: var(--color-grey-700);
    border: 1px solid var(--color-grey-200);
    border-radius: 10px;
    padding: 14px 16px;
    width: 100%;
    max-width: 460px;
    background: #fff;
  }
  .il-progress li { display: flex; align-items: center; gap: 10px; }
  .il-progress li i { font-size: 16px; color: var(--color-success-600); }
  .il-progress li.done { color: var(--color-grey-700); }
  .il-progress li.active { color: var(--color-brand-700); font-weight: 600; }
  .il-spin {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--color-brand-200);
    border-top-color: var(--color-brand-600);
    animation: ilspin 0.9s linear infinite;
  }
  @keyframes ilspin { to { transform: rotate(360deg); } }

  /* ============================================================
     Right rail
     ============================================================ */
  .il-rail {
    background:
      radial-gradient(120% 80% at 100% 0%, rgba(135, 79, 250, 0.18), transparent 60%),
      linear-gradient(180deg, var(--color-brand-50), #f7f3ff 60%, #fff);
    border-left: 1px solid var(--color-brand-100);
    padding: var(--il-pad-y) 32px;
    display: flex; flex-direction: column; gap: 22px;
    overflow: hidden;
    position: relative;
  }
  .il-rail.is-muted {
    background: linear-gradient(180deg, var(--color-grey-50), var(--color-grey-100));
    border-color: var(--color-grey-200);
  }
  .il-rail.is-muted .il-rail-card {
    filter: grayscale(0.5);
    opacity: 0.78;
  }

  .il-rail-card {
    background: #fff;
    border: 1px solid var(--color-brand-100);
    border-radius: 14px;
    padding: 22px;
    display: flex; flex-direction: column; gap: 16px;
    position: relative;
    box-shadow: 0 8px 24px -12px rgba(135, 79, 250, 0.25);
  }
  .il-rail.is-muted .il-rail-card {
    border-color: var(--color-grey-200);
    box-shadow: none;
  }
  .il-rail-eyebrow {
    font: 700 10.5px/1 var(--font-sans);
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--color-brand-700);
  }
  .il-rail.is-muted .il-rail-eyebrow { color: var(--color-grey-500); }

  /* Stamp overlay */
  .il-stamp {
    position: absolute;
    top: 16px; right: -10px;
    transform: rotate(8deg);
    padding: 5px 14px;
    border: 2px solid currentColor;
    border-radius: 6px;
    font: 800 13px/1 var(--font-sans);
    letter-spacing: 0.16em; text-transform: uppercase;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .il-stamp-warn { color: var(--color-warning-700); }
  .il-stamp-danger { color: var(--color-error-600); }
  .il-stamp-ok { color: var(--color-success-700); }

  /* Inviter block */
  .il-inviter { display: flex; align-items: center; gap: 12px; }
  .il-inviter-name { font: 600 15px/1.2 var(--font-sans); color: var(--color-grey-900); }
  .il-inviter-sub { font: 400 12.5px/1.4 var(--font-sans); color: var(--color-grey-600); margin-top: 2px; }

  .il-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--color-brand-600); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font: 600 13px/1 var(--font-sans);
    flex: 0 0 auto;
  }
  .il-avatar-lg { width: 44px; height: 44px; font-size: 15px; }
  .il-avatar-sm { width: 26px; height: 26px; font-size: 11px; }

  .il-note {
    margin: 0;
    padding: 12px 14px;
    background: var(--color-brand-50);
    border-radius: 10px;
    font: 400 13.5px/1.5 var(--font-sans);
    color: var(--color-grey-700);
    font-style: italic;
    border-left: 2.5px solid var(--color-brand-400);
  }
  .il-rail.is-muted .il-note { background: var(--color-grey-100); border-left-color: var(--color-grey-300); }

  /* Meta key/value */
  .il-meta {
    margin: 0; padding: 0;
    display: flex; flex-direction: column; gap: 0;
    border-top: 1px solid var(--color-grey-100);
  }
  .il-meta > div {
    display: grid;
    grid-template-columns: 78px 1fr;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--color-grey-100);
    gap: 10px;
  }
  .il-meta dt {
    font: 600 11px/1 var(--font-sans);
    color: var(--color-grey-500);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0;
  }
  .il-meta dd {
    font: 500 13.5px/1.3 var(--font-sans);
    color: var(--color-grey-800);
    margin: 0;
    word-break: break-word;
  }
  .il-meta dd.is-hi {
    background: var(--color-brand-100);
    color: var(--color-brand-800);
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 600;
    justify-self: start;
  }
  .il-meta .il-mute { color: var(--color-grey-500); font-weight: 400; letter-spacing: 0; }

  .il-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    border-radius: 999px;
    font: 600 11.5px/1 var(--font-sans);
  }
  .il-pill i { font-size: 12px; }
  .il-pill-brand {
    background: var(--color-brand-100);
    color: var(--color-brand-800);
  }

  .il-rail-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .il-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--color-grey-100);
    color: var(--color-grey-700);
    border-radius: 999px;
    padding: 3px 9px;
    font: 500 11px/1 var(--font-sans);
  }
  .il-tag i { font-size: 12px; color: var(--color-grey-500); }

  .il-rail-foot {
    margin-top: auto;
    font: 500 11px/1.4 var(--font-sans);
    color: var(--color-grey-500);
    letter-spacing: 0.04em;
  }

  /* Help-only rail variant */
  .il-rail-help {
    background: linear-gradient(180deg, var(--color-grey-50), #fff);
    border-left-color: var(--color-grey-200);
  }
  .il-help-card {
    background: #fff;
    border: 1px solid var(--color-grey-200);
    border-radius: 14px;
    padding: 22px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .il-help-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--color-grey-100); color: var(--color-grey-700);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .il-help-card h4 { margin: 0; font: 600 15px/1.3 var(--font-sans); color: var(--color-grey-900); }
  .il-help-card p { margin: 0; font: 400 13px/1.5 var(--font-sans); color: var(--color-grey-600); }
  .il-help-list { list-style: none; padding: 0; margin: 4px 0 0; display: flex; flex-direction: column; gap: 6px; font: 500 12.5px var(--font-sans); color: var(--color-grey-700); }
  .il-help-list li { display: flex; align-items: center; gap: 8px; }
  .il-help-list li i { color: var(--color-grey-500); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="invite-landing.jsx"></script>
</head>
<body>
<div id="root"></div>
</body>
</html>
