  .danger-zone .head { padding:12px 16px;border-bottom:1px solid #fecaca;display:flex;justify-content:space-between;align-items:center; }
  .danger-zone .head h3 { margin:0;font:600 13px var(--font-sans);color:var(--adm-danger-700); }

  .danger-row .t { font:600 13px var(--font-sans);color:var(--adm-text-1); }
  .danger-row .s { font:500 12px var(--font-sans);color:var(--adm-text-3);margin-top:2px; }
  .usage-bar { background:#f3f4f6;height:6px;border-radius:999px;overflow:hidden; }
  .usage-bar > div { height:100%; }
  .quota-row { padding:14px 16px;border-bottom:1px solid var(--adm-border-2); }
  .quota-row:last-child { border-bottom:0; }
  .quota-row .top { display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px; }
  .quota-row .name { font:600 13px var(--font-sans);color:var(--adm-text-1); }
  .quota-row .used { font:500 12.5px var(--font-sans);color:var(--adm-text-3); }

  .quota-row .help { font:500 11.5px var(--font-sans);color:var(--adm-text-3);margin-top:6px;display:flex;justify-content:space-between; }
  .flag-row { padding:13px 16px;border-bottom:1px solid var(--adm-border-2);display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center; }
  .flag-row:last-child { border-bottom:0; }
  .flag-name { font:600 12.5px var(--font-mono);color:var(--adm-text-1); }
  .flag-meta { font:500 11.5px var(--font-sans);color:var(--adm-text-3);margin-top:2px; }
  .seg-bar { display:flex;height:8px;border-radius:999px;overflow:hidden;background:#f3f4f6;margin-top:6px; }
  .seg-bar > div { height:100%; }
  .sparkbox { display:flex;align-items:flex-end;gap:3px;height:60px;padding:10px 14px;background:var(--adm-bg-2);border-radius:8px;margin-bottom:14px; }
  .sparkbox .bar { flex:1;background:#6366f1;border-radius:2px 2px 0 0;opacity:0.85; }
  .sparkbox .bar.warn { background:#f59e0b; }
  .timeline-item { display:grid;grid-template-columns:22px 1fr;gap:12px;padding:10px 16px;border-bottom:1px solid var(--adm-border-2); }
  .timeline-item:last-child { border-bottom:0; }
  .timeline-item .dot { width:8px;height:8px;border-radius:50%;background:#6366f1;margin-top:6px;justify-self:center; }
  .timeline-item .dot.warn { background:#f59e0b; }
  .timeline-item .dot.danger { background:#ef4444; }
  .timeline-item .dot.ok { background:#10b981; }
  .timeline-item .ti { font:600 13px var(--font-sans);color:var(--adm-text-1); }
  .timeline-item .ts { font:500 11.5px var(--font-sans);color:var(--adm-text-3);margin-top:2px; }
  .members-bulk { display:none;align-items:center;gap:10px;padding:9px 14px;background:#eef2ff;border:1px solid #c7d2fe;border-radius:8px;margin-bottom:10px;font:500 12.5px var(--font-sans);color:#4338ca; }

  .members-bulk .sp { flex:1; }
  .panel { display:none; }
  .panel.active { display:block; }
  .adm-segmented { display:inline-flex;background:white;border:1px solid var(--adm-border);border-radius:8px;padding:3px;gap:2px; }
  .adm-segmented .seg { background:transparent;border:0;cursor:pointer;padding:5px 12px;border-radius:5px;font:600 12px var(--font-sans);color:var(--adm-text-3); }

function setTab(name, opts = {}) {
  const tabs = $$('.adm-tab');
  tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  $('#panel').innerHTML = Panels[name]();
  bindPanel(name);
  if (!opts.silent) history.replaceState({}, "", `?tab=${name}`);
  window.scrollTo({ top: 0, behavior: opts.silent ? "auto" : "smooth" });
}

// ============================================================
// Per-panel binding
// ============================================================
function bindPanel(name) {
  // Jump buttons (overview → other tabs)
  $$('[data-jump]', $('#panel')).forEach(b => b.onclick = () => setTab(b.dataset.jump));

  if (name === "overview") bindOverview();
  else if (name === "members") bindMembers();
  else if (name === "licensing") bindLicensing();
  else if (name === "flags") bindFlags();
  else if (name === "quotas") bindQuotas();
  else if (name === "audit") bindAudit();
  else if (name === "danger") bindDanger();
}

function bindOverview() {
  // Member kebabs in overview
  $$('.adm-table .adm-kebab', $('#panel')).forEach(kb => kb.onclick = (e) => { e.stopPropagation(); openMemberMenu(kb); });
  // Sidebar actions
  $('[data-act="change-plan"]')?.addEventListener('click', () => openChangePlan(event.currentTarget));
  $('[data-act="open-stripe"]')?.addEventListener('click', () => T("Opening Stripe cus_PqZ1k7… in new tab", "info"));
  $('[data-act="start-imp"]')?.addEventListener('click', async () => {
    const ok = await AdminShell.confirmDialog({
      title: `Start impersonation session on ${ORG}?`,
      body: "Pick which member you'll impersonate next. Sessions auto-expire after 30 min; the owner is notified by email.",
      confirmLabel: "Continue",
    });
    if (ok) { setTab("members"); T("Impersonation pending — pick a member ↓", "warn"); }
  });
  // Flag overview buttons
  $$('.flag-row [data-act="edit-flag"]', $('#panel')).forEach(b => b.onclick = () => {
    const f = b.closest('.flag-row').dataset.flag;
    location.href = `admin-flag-detail.html?f=${f}`;
  });
  $$('.flag-row [data-act="remove-flag"]', $('#panel')).forEach(b => b.onclick = () => removeOverride(b));
}

function bindMembers() {
  const tbody = $('#panel #m-table tbody');
  const bulk = $('#panel #m-bulk');
  const bulkCt = $('.ct', bulk);
  const updateBulk = () => {
    const checked = $$('input.m-row:checked', tbody);
    bulkCt.textContent = checked.length;
    bulk.classList.toggle('show', checked.length > 0);
  };
  // Select-all
  $('#panel #m-all').onchange = (e) => {
    $$('input.m-row', tbody).forEach(cb => cb.checked = e.target.checked);
    updateBulk();
  };
  $$('input.m-row', tbody).forEach(cb => cb.onchange = updateBulk);
  // Search filter
  $('#panel #m-search').oninput = (e) => {
    const q = e.target.value.toLowerCase();
    $$('tr', tbody).forEach(tr => {
      const txt = tr.textContent.toLowerCase();
      tr.style.display = q && !txt.includes(q) ? "none" : "";
    });
  };
  // Filter chips
  $('[data-filter="role"]', $('#panel')).onclick = (e) => AdminShell.popMenu(e.currentTarget, [
    { label: "All roles",         onClick: () => filterRole(null, e.currentTarget) },
    { label: "Owner",             onClick: () => filterRole("Owner", e.currentTarget) },
    { label: "Admin",             onClick: () => filterRole("Admin", e.currentTarget) },
    { label: "Loan officer",      onClick: () => filterRole("Loan officer", e.currentTarget) },
    { label: "Compliance",        onClick: () => filterRole("Compliance", e.currentTarget) },
    { label: "Viewer",            onClick: () => filterRole("Viewer", e.currentTarget) },
  ]);
  $('[data-filter="mfa"]', $('#panel')).onclick = (e) => AdminShell.popMenu(e.currentTarget, [
    { label: "Any",     onClick: () => filterMfa(null, e.currentTarget) },
    { label: "MFA on",  onClick: () => filterMfa("ON", e.currentTarget) },
    { label: "MFA off", onClick: () => filterMfa("OFF", e.currentTarget) },
  ]);
  // Row kebabs + click-through
  $$('tr[data-member]', tbody).forEach(tr => {
    tr.onclick = (e) => {
      if (e.target.closest('input, button')) return;
      location.href = `admin-user-detail.html?u=${encodeURIComponent(tr.dataset.member)}`;
    };
    $('.adm-kebab', tr).onclick = (e) => { e.stopPropagation(); openMemberMenu(e.currentTarget); };
  });
  // Toolbar actions
  $('[data-act="invite"]', $('#panel')).onclick = () => T("Invite modal opening…", "info");
  $('[data-act="export-members"]', $('#panel')).onclick = () => T("Members CSV queued · email when ready", "info");
  $('[data-act="load-more"]', $('#panel')).onclick = (e) => { e.preventDefault(); T("Loaded 30 more members", "success"); };
  // Bulk actions
  $('[data-bulk="role"]', $('#panel')).onclick = (e) => AdminShell.popMenu(e.currentTarget, [
    { label: "Admin",        onClick: () => bulkAction("role", "Admin") },
    { label: "Loan officer", onClick: () => bulkAction("role", "Loan officer") },
    { label: "Compliance",   onClick: () => bulkAction("role", "Compliance") },
    { label: "Viewer",       onClick: () => bulkAction("role", "Viewer") },
  ]);
  $('[data-bulk="mfa"]', $('#panel')).onclick = async () => {
    const n = $$('input.m-row:checked', tbody).length;
    const ok = await AdminShell.confirmDialog({ title: `Require MFA for ${n} member${n>1?"s":""}?`, body: "They will be required to enroll an MFA factor on next login. Until they do, they cannot access the org.", confirmLabel: "Require MFA" });
    if (ok) T(`MFA requirement applied to ${n} member${n>1?"s":""}`, "success");
  };
  $('[data-bulk="reset"]', $('#panel')).onclick = async () => {
    const n = $$('input.m-row:checked', tbody).length;
    const ok = await AdminShell.confirmDialog({ title: `Send password reset to ${n} member${n>1?"s":""}?`, body: "Each member receives a reset email. Current passwords remain valid until reset is completed.", confirmLabel: "Send resets" });
    if (ok) T(`Reset emails sent to ${n} member${n>1?"s":""}`, "success");
  };
  $('[data-bulk="remove"]', $('#panel')).onclick = async () => {
    const n = $$('input.m-row:checked', tbody).length;
    const ok = await AdminShell.confirmDialog({ title: `Remove ${n} member${n>1?"s":""} from ${ORG}?`, body: "They lose access immediately. Their authored records stay in the org. Reversible by re-invite.", confirmLabel: "Remove", danger: true });
    if (ok) {
      $$('input.m-row:checked', tbody).forEach(cb => cb.closest('tr').remove());
      updateBulk();
      T(`${n} member${n>1?"s":""} removed`, "warn");
    }
  };
}

function bindLicensing() {
  $('[data-act="change-plan"]', $('#panel')).onclick = (e) => openChangePlan(e.currentTarget);
  $('[data-act="add-seats"]', $('#panel')).onclick = async () => {
    const ok = await AdminShell.confirmDialog({ title: `Add 10 seats to ${ORG}?`, body: "Increases plan cap from 50 to 60 seats. Pro-rated charge today: ~$165. Confirms with owner via email.", confirmLabel: "Add 10 seats" });
    if (ok) T("Seats added · invoice INV-2026-05-A queued", "success");
  };
  $('[data-act="open-stripe"]', $('#panel'))?.addEventListener('click', () => T("Opening Stripe cus_PqZ1k7…", "info"));
  $('[data-act="export-invoices"]', $('#panel')).onclick = () => T("Invoice export queued (PDF + CSV)", "info");
  // Invoice kebabs
  $$('tr[data-invoice] .adm-kebab', $('#panel')).forEach(kb => kb.onclick = (e) => {
    e.stopPropagation();
    const num = kb.closest('tr').dataset.invoice;
    AdminShell.popMenu(kb, [
      { label: "Download PDF",   icon: "picture_as_pdf", onClick: () => T(`Downloading ${num}.pdf`, "info") },
      { label: "Open in Stripe", icon: "open_in_new",    onClick: () => T(`Opening ${num} in Stripe`, "info") },
      { label: "Email to owner", icon: "mail",           onClick: () => T(`${num} emailed to jvasquez@pinecrest.com`, "success") },
      "-",
      { label: "Refund…",        icon: "undo", danger: true, onClick: async () => {
        const ok = await AdminShell.confirmDialog({ title: `Refund ${num}?`, body: "Issues a full refund to the customer's card ending 4242. Two-person approval required for refunds over $1,000.", confirmLabel: "Refund", danger: true });
        if (ok) T(`Refund request submitted for ${num} · awaiting approval`, "warn");
      }},
    ]);
  });
}

function bindFlags() {
  $('[data-act="add-override"]', $('#panel')).onclick = () => T("Flag override picker opening…", "info");
  $('[data-filter="state"]', $('#panel')).onclick = (e) => AdminShell.popMenu(e.currentTarget, [
    { label: "All",     onClick: () => { e.currentTarget.lastChild.textContent = " State: All"; T("Showing all overrides", "info"); }},
    { label: "ON only", onClick: () => { T("Filtered to ON overrides", "info"); }},
    { label: "OFF only",onClick: () => { T("Filtered to OFF overrides", "info"); }},
  ]);
  $$('.flag-row [data-act="edit-flag"]', $('#panel')).forEach(b => b.onclick = () => {
    const f = b.closest('.flag-row').dataset.flag;
    location.href = `admin-flag-detail.html?f=${f}`;
  });
  $$('.flag-row [data-act="remove-flag"]', $('#panel')).forEach(b => b.onclick = () => removeOverride(b));
  $$('[data-act="override-flag"]', $('#panel')).forEach(b => b.onclick = async () => {
    const f = b.dataset.flag;
    const ok = await AdminShell.confirmDialog({ title: `Override ${f} for ${ORG}?`, body: "Set an org-specific value that overrides the global rollout. Useful for pilots and incident-response pinning.", confirmLabel: "Create override" });
    if (ok) T(`Override created for ${f}`, "success");
  });
}

function bindQuotas() {
  $$('.adm-segmented .seg', $('#panel')).forEach(s => s.onclick = () => {
    $$('.adm-segmented .seg', $('#panel')).forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    T(`Range: ${s.textContent.trim()}`, "info");
  });
  $('[data-act="export-usage"]', $('#panel')).onclick = () => T("Usage export queued (CSV)", "info");
  $('[data-act="adjust-quotas"]', $('#panel')).onclick = async () => {
    const ok = await AdminShell.confirmDialog({ title: `Adjust quotas for ${ORG}?`, body: "Quota changes take effect immediately. Increases above plan defaults are billed at the next renewal. Requires owner notification.", confirmLabel: "Open quota editor" });
    if (ok) T("Quota editor opening…", "info");
  };
  $$('[data-act="quota-detail"]', $('#panel')).forEach(a => a.onclick = (e) => {
    e.preventDefault();
    T(`Drilling into ${a.dataset.quota}…`, "info");
  });
}

function bindAudit() {
  $$('[data-filter]', $('#panel')).forEach(b => b.onclick = (e) => {
    const kind = b.dataset.filter;
    const opts = {
      actor: ["All","Members only","Admins only","System only"],
      action: ["All","loan.*","member.*","flag.*","login.*","compliance.*"],
      severity: ["All","OK","WARN","DANGER"],
    }[kind];
    AdminShell.popMenu(e.currentTarget, opts.map(o => ({ label: o, onClick: () => T(`${kind}: ${o}`, "info") })));
  });
  $('[data-act="export-audit"]', $('#panel')).onclick = () => T("Audit export queued (JSONL · 1.2 GB est.)", "info");
  $$('tr[data-audit] .adm-kebab', $('#panel')).forEach(kb => kb.onclick = (e) => {
    e.stopPropagation();
    AdminShell.popMenu(kb, [
      { label: "Copy entry JSON", icon: "content_copy", onClick: () => T("Audit entry JSON copied", "success") },
      { label: "Open in audit log", icon: "open_in_new", onClick: () => location.href = "admin-audit.html" },
      { label: "Pin to incident…", icon: "push_pin", onClick: () => T("Pin to incident: pick one…", "info") },
    ]);
  });
}

function bindDanger() {
  $('[data-act="reset-flags"]', $('#panel')).onclick = async () => {
    const ok = await AdminShell.confirmDialog({ title: `Reset all 4 flag overrides for ${ORG}?`, body: "Pinecrest will revert to the global rollout values for each flag. Behavior may change immediately for some users.", confirmLabel: "Reset flags", danger: false });
    if (ok) T("All 4 overrides removed", "warn");
  };
  $('[data-act="force-mfa"]', $('#panel')).onclick = async () => {
    const ok = await AdminShell.confirmDialog({ title: `Force MFA for all ${ORG} members?`, body: "2 members without MFA will be locked out on next login until they enroll. Owner is notified.", confirmLabel: "Force MFA" });
    if (ok) T("MFA enforced · 2 members must enroll", "warn");
  };
  $('[data-act="revoke-keys"]', $('#panel')).onclick = async () => {
    const ok = await AdminShell.confirmDialog({ title: `Revoke all 7 API keys for ${ORG}?`, body: "All Pinecrest integrations will fail until keys are rotated. Use for credential leak or compromised account only. Owner is notified.", confirmLabel: "Revoke all keys", danger: true });
    if (ok) T("All 7 keys revoked · owner notified", "danger");
  };
  $('[data-act="readonly"]', $('#panel')).onclick = async () => {
    const ok = await AdminShell.confirmDialog({ title: `Move ${ORG} to read-only?`, body: "All members lose write access. A banner appears explaining the state. Reversible at any time.", confirmLabel: "Make read-only" });
    if (ok) T(`${ORG} is now read-only`, "warn");
  };
  $('[data-act="lock"]', $('#panel')).onclick = async () => {
    const ok = await AdminShell.confirmDialog({ title: `Lock ${ORG}?`, body: "All access is suspended. Data is preserved. Two-person rule applies — a second admin must approve within 5 minutes. Use for abuse, fraud, or compliance holds only.", confirmLabel: "Request lock", danger: true });
    if (ok) T("Lock request sent to Marc Olsen · waiting 5:00", "danger");
  };
  $('[data-act="delete"]', $('#panel')).onclick = async () => {
    const ok = await AdminShell.confirmDialog({ title: `Schedule deletion for ${ORG}?`, body: "Org enters a 30-day grace period. After that, all data is permanently destroyed — including audit log. Cannot be undone after grace expires. Requires two-person approval.", confirmLabel: "Schedule deletion", danger: true });
    if (ok) T("Deletion scheduled · grace expires June 10 · awaiting approval", "danger");
  };
}

// ============================================================
// Shared helpers
// ============================================================
function openMemberMenu(kb) {
  const tr = kb.closest('tr');
  const name = $('.nm', tr).textContent;
  const email = $('.sub', tr).textContent;
  AdminShell.popMenu(kb, [
    { label: "Open user",            icon: "open_in_new",    onClick: () => location.href = `admin-user-detail.html?u=${encodeURIComponent(email)}` },
    { label: "Impersonate",          icon: "switch_account", onClick: () => T(`Impersonation session started for ${name}`, "warn") },
    { label: "Copy email",           icon: "content_copy",   onClick: () => { navigator.clipboard.writeText(email); T("Email copied", "success"); }},
    { label: "Send password reset",  icon: "key",            onClick: () => T(`Password reset sent to ${email}`, "success") },
    { label: "Change role…",         icon: "shield_person",  onClick: () => T(`Role picker for ${name}…`, "info") },
    "-",
    { label: "Remove from org",      icon: "person_remove", danger: true, onClick: async () => {
      const ok = await AdminShell.confirmDialog({ title: `Remove ${name} from ${ORG}?`, body: "They lose access immediately. Their authored records stay in the org.", confirmLabel: "Remove", danger: true });
      if (ok) { tr.remove(); T(`${name} removed from ${ORG}`, "warn"); }
    }},
  ]);
}

function openChangePlan(anchor) {
  AdminShell.popMenu(anchor, [
    { label: "Trial",         onClick: () => T("Plan change requires approval · request sent", "warn") },
    { label: "Starter",       onClick: () => T("Plan change requires approval · request sent", "warn") },
    { label: "Growth ✓",      onClick: () => T("Already on Growth", "info") },
    { label: "Enterprise",    onClick: () => T("Plan change requires approval · request sent", "warn") },
  ]);
}

async function removeOverride(b) {
  const row = b.closest('.flag-row');
  const flag = row.dataset.flag;
  const ok = await AdminShell.confirmDialog({ title: `Remove override for ${flag}?`, body: `${ORG} will fall back to the global rollout value.`, confirmLabel: "Remove override", danger: true });
  if (ok) { row.style.opacity = "0.4"; T(`Override removed · ${flag}`, "success"); }
}

function filterRole(role, btn) {
  btn.lastChild.textContent = ` Role: ${role || "All"}`;
  $$('#m-table tbody tr').forEach(tr => {
    const r = tr.children[2].textContent.trim();
    tr.style.display = !role || r === role ? "" : "none";
  });
}
function filterMfa(state, btn) {
  btn.lastChild.textContent = ` MFA: ${state || "Any"}`;
  $$('#m-table tbody tr').forEach(tr => {
    const txt = tr.children[4].textContent.trim();
    tr.style.display = !state || txt === state ? "" : "none";
  });
}

function bulkAction(kind, val) {
  const n = $$('#m-table input.m-row:checked').length;
  T(`${kind} → ${val} applied to ${n} member${n>1?"s":""}`, "success");
}
</script>
